<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEKI</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="d-flex" id="wrapper">
    <!-- Sidebar -->
    <div class="sidebar text-white" id="sidebar-wrapper">
        <div class="sidebar-heading text-center py-4 primary-text fs-3 fw-bold tracking-tight border-bottom logo-brand">
            <i class="bi bi-layers me-2"></i>AEKI
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="{{ url_for('routes.dashboard') }}" class="list-group-item list-group-item-action bg-transparent second-text active">
                <i class="bi bi-speedometer2 me-2"></i>Dashboard
            </a>
            <a href="{{ url_for('routes.inventory') }}" class="list-group-item list-group-item-action bg-transparent second-text fw-bold">
                <i class="bi bi-box2 me-2"></i>Inventory
            </a>
            <a href="{{ url_for('routes.orders') }}" class="list-group-item list-group-item-action bg-transparent second-text fw-bold">
                <i class="bi bi-cart3 me-2"></i>Orders
            </a>
            <a href="{{ url_for('routes.analytics') }}" class="list-group-item list-group-item-action bg-transparent second-text fw-bold">
                <i class="bi bi-graph-up-arrow me-2"></i>Analytics
            </a>
        </div>
    </div>
    <!-- /#sidebar-wrapper -->

    <!-- Page Content -->
    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light py-4 px-4 glass-nav mb-4">
            <div class="d-flex align-items-center w-100">
                <i class="bi bi-list primary-text fs-3 me-3" id="menu-toggle"></i>
                <h2 class="fs-3 m-0 text-dark fw-bold page-title">{% block header %}{% endblock %}</h2>
                <div class="ms-auto d-flex align-items-center">
                    <div class="profile-avatar shadow-sm me-2">
                        <i class="bi bi-person"></i>
                    </div>
                    <span class="text-dark fw-medium">Admin</span>
                </div>
            </div>
        </nav>

        <div class="container-fluid px-4">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<!-- /#page-content-wrapper -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var el = document.getElementById("wrapper");
    var toggleButton = document.getElementById("menu-toggle");

    toggleButton.onclick = function () {
        el.classList.toggle("toggled");
    };
</script>
</body>
</html>
